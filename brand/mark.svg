<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- Cup Season master mark — the flag in the cup, a four-color orbit
       lying on the green (elliptical, in perspective). The back arc passes
       BEHIND the pole; the front arc sweeps in front of the cup.
       Dark-background version. -->
  <g stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M61.9 73.8 A33 13 0 0 1 18.1 67.5" stroke="#43E07C"/>
    <path d="M16.1 65.4 A33 13 0 0 1 29.1 51.4" stroke="#57A8FF"/>
    <path d="M34.1 50.2 A33 13 0 0 1 64.5 50.7" stroke="#A78BFA"/>
    <path d="M71.3 52.8 A33 13 0 0 1 76.6 68.5" stroke="#FB8B4B"/>
  </g>
  <ellipse cx="48" cy="62" rx="10" ry="4" stroke="#F4F7F4" stroke-width="4.5"/>
  <path d="M48 60V16" stroke="#F4F7F4" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M48 14l20 7.5L48 29z" fill="#F4F7F4"/>
</svg>
